# Deploys to GitHub Pages under the /<repo>/ project prefix.
# The repo keeps root-absolute paths (correct for the final domain);
# this workflow prefixes them ONLY inside the deployed artifact.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # daily rebuild so ChurchTools events stay fresh (UTC)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upcoming events + flyer from ChurchTools (public calendars, no token)
        run: python3 tools/ct-events.py || echo "::warning::ct-events failed — deploying with the checked-in snapshot"

      - name: Bake CMS content into the marked elements
        run: python3 tools/content-bake.py

      - name: Generate /en/ and /uk/ locale trees + hreflang
        env:
          SITE_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python3 tools/i18n-build.py --origin "$SITE_ORIGIN" --patch-de

      - name: Prefix root-absolute URLs for project-page hosting
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python3 - <<'PY'
          import os, pathlib
          prefix = '/' + os.environ['REPO_NAME']
          for p in pathlib.Path('.').rglob('*.html'):
              if '.git' in p.parts:
                  continue
              t = p.read_text(encoding='utf-8')
              t = (t.replace('href="/', 'href="' + prefix + '/')
                     .replace('src="/', 'src="' + prefix + '/')
                     .replace('srcset="/', 'srcset="' + prefix + '/')
                     .replace(', /img/', ', ' + prefix + '/img/'))
              p.write_text(t, encoding='utf-8')
          print('prefixed root-absolute URLs with', prefix)
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
